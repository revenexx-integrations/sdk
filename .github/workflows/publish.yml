name: Publish

on:
  push:
    tags:
      - '@revenexx/integrations-node-sdk@*'

permissions:
  contents: read
  id-token: write # OIDC trusted publishing — no NPM_TOKEN needed

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # OIDC needs npm >= 11.5.1
      - run: npm ci
      - run: npm run release
